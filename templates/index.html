<!DOCTYPE html>
<html>
<head>
    <title>Student Placement Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
        }
        .form-container {
            max-width: 500px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #333;
        }
        .form-container input[type="number"] {
            width: 100%;
            padding: 10px;
            display: block;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1em;
        }
        .form-container input[type="number"]:focus {
            outline: none;
            border-color: #4CAF50;
        }
        .form-container input.invalid {
            border-color: #e74c3c;
        }
        .form-container input.invalid:focus {
            border-color: #e74c3c;
        }
        .form-container input[type="submit"] {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 5px;
        }
        .form-container input[type="submit"]:hover {
            background-color: #45a049;
        }
        .result {
            font-size: 1.5em;
            color: #4CAF50;
            text-align: center;
            margin-top: 20px;
        }
        .error-message {
            color: #e74c3c;
            font-size: 0.8em;
            margin-top: 5px;
            min-height: 0;
            display: none;
        }
        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Student Placement Prediction</h2>
        <form action="/predict" method="post" id="predictionForm" novalidate>

            <div class="form-group">
                <label for="CGPA">CGPA:</label>
                <input type="number" step="0.01" name="CGPA" id="CGPA" min="1" max="10" required>
                <div class="error-message" id="CGPA_error">Please enter CGPA between 1 and 10</div>
            </div>

            <div class="form-group">
                <label for="SSC_Marks">10th_Marks:</label>
                <input type="number" step="0.01" name="SSC_Marks" id="SSC_Marks" min="1" max="100" required>
                <div class="error-message" id="SSC_Marks_error">Please enter 10th Marks between 1 and 100</div>
            </div>

            <div class="form-group">
                <label for="HSC_Marks">12th_Marks:</label>
                <input type="number" step="0.01" name="HSC_Marks" id="HSC_Marks" min="1" max="100" required>
                <div class="error-message" id="HSC_Marks_error">Please enter 12th Marks between 1 and 100</div>
            </div>

            <input type="submit" value="Predict">
        </form>

        <script>
            const form = document.getElementById('predictionForm');
            const fields = [
                { id: 'CGPA', min: 1, max: 10 },
                { id: 'SSC_Marks', min: 1, max: 100 },
                { id: 'HSC_Marks', min: 1, max: 100 }
            ];

            function validateField(field) {
                const input = document.getElementById(field.id);
                const error = document.getElementById(field.id + '_error');
                const value = parseFloat(input.value);

                if (input.value === '' || isNaN(value) || value < field.min || value > field.max) {
                    input.classList.add('invalid');
                    error.classList.add('show');
                    return false;
                } else {
                    input.classList.remove('invalid');
                    error.classList.remove('show');
                    return true;
                }
            }

            fields.forEach(field => {
                const input = document.getElementById(field.id);
                input.addEventListener('input', () => validateField(field));
            });

            form.addEventListener('submit', function(e) {
                let allValid = true;
                fields.forEach(field => {
                    if (!validateField(field)) {
                        allValid = false;
                    }
                });
                if (!allValid) {
                    e.preventDefault();
                }
            });
        </script>
        {% if prediction_text %}
        <div class="result">{{ prediction_text }}</div>
        {% endif %}
    </div>
</body>
</html>
